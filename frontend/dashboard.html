<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Appointments</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="global.css">
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-3">
  <span class="navbar-brand  fw-bold">Appointments</span>
  <div>
    <span class="text-white me-3" id="user-name"></span>
    <button class="btn btn-outline-light" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="container my-4">
  <div class="card p-4 mb-4">
    <h5 class="mb-3 fw-bold">Book an Appointment</h5>
    <div id="form-alert"></div>
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label">Service</label>
        <select id="service-select" class="form-select"></select>
      </div>
      <div class="col-md-3">
        <label class="form-label">Date</label>
        <input type="date" id="appt-date" class="form-control" />
      </div>
      <div class="col-md-3">
        <label class="form-label">Time</label>
        <input type="time" id="appt-time" class="form-control" />
      </div>
      <div class="col-12">
        <label class="form-label">Notes (optional)</label>
        <textarea id="appt-notes" class="form-control" rows="2"></textarea>
      </div>
      <div class="col-12">
        <button class="btn btn-success w-100" onclick="bookAppointment()">Book Appointment</button>
      </div>
    </div>
  </div>

  <h5 class="mb-3 fw-bold">My Bookings</h5>
  <div class="table-responsive">
    <table class="table table-bordered table-hover align-middle">
      <thead class="table-light">
        <tr>
          <th>Service</th>
          <th>Date</th>
          <th>Time</th>
          <th>Status</th>
          <th>Notes</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="appointments-table"></tbody>
    </table>
  </div>
</div>

<script src="functions/dashboard.js"></script>
</body>
</html>
