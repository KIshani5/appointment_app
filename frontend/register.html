<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Register: Appointment Booking</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="global.css">
  
</head>

<!-- body -->
<body class="d-flex align-items-center justify-content-center min-vh-100">
  <div class="card p-4" style="width: 100%; max-width: 420px;">
    
    <!-- header -->
    <h4 class="text-center mb-4 fw-bold">Create Account</h4>
    <div id="alert-box"></div>
    <div class="mb-3">
      <label class="form-label">Full Name:*</label>
      <input type="text" id="name" class="form-control" placeholder="John Doe" />
    </div>
    <div class="mb-3">
      <label class="form-label">Email:*</label>
      <input type="email" id="email" class="form-control" placeholder="you@email.com" />
    </div>
    <div class="mb-3">
      <label class="form-label">Password:*</label>
      <input type="password" id="password" class="form-control" placeholder="Min 6 characters" />
    </div>
    <!-- button section -->
    <button class="btn btn-success w-100" onclick="handleRegister()">Register</button>
    <!-- login change -->
    <p class="text-center mt-3 mb-0">
      Have an account? <a href="index.html">Login</a>
    </p>
  </div>

  <script src="function/auth.js"></script>

</body>

</html>
