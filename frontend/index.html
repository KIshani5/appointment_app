<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login: Appointment Booking</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="global.css">
</head>

<!-- body -->
<body class="d-flex align-items-center justify-content-center min-vh-100">
  <div class="card p-4" style="width: 100%; max-width: 420px;">
    <!-- header -->
    <h4 class="text-center mb-4 fw-bold">Login to book Appointments</h4>

    <!-- error -->
    <div id="alert-box"></div>
    <div class="mb-3">
      <label class="form-label">Email:</label>
      <input type="email" id="email" class="form-control" placeholder="you@email.com" />
    </div>
    <div class="mb-3">
      <label class="form-label">Password:</label>
      <input type="password" id="password" class="form-control" placeholder="••••••••" />
    </div>

    <!-- button section -->
    <button class="btn btn-primary w-100" onclick="handleLogin()">Login</button>
    
    <!-- register -->
    <p class="text-center mt-3 mb-0">
      No account? <a href="register.html">Register here</a>
    </p>
  </div>

  <script src="function/auth.js"></script>
</body>
</html>
